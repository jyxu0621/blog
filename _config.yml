title: Jason Xu's Blog
subtitle: 记录技术学习与项目实践
description: Jason Xu 的个人技术博客
keywords: 技术,学习,项目
author: Jason Xu
language: zh-CN
timezone: Asia/Shanghai

url: https://jyxu0621.github.io/blog/
root: /blog/
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

default_category: uncategorized
category_map:
tag_map:

date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

per_page: 10
pagination_dir: page

include:
exclude:
ignore:

theme: stellar
theme_config:
  plugins:
    mathjax:
      inject: '<!-- MathJax is rendered server-side. -->'

feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true
  content_limit: false
  order_by: -date
  autodiscovery: true

mathjax:
  tags: none
  single_dollars: true
  cjk_width: 0.9
  normal_width: 0.6
  append_css: true
  every_page: false
  packages: []
  extension_options: {}
