logo:
  avatar: '[https://github.com/jyxu0621.png](/blog/)'
  title: "[Jason Xu's Blog](/blog/)"
  subtitle: 记录技术学习与项目实践

menubar:
  columns: 4
  items:
    - id: home
      icon: jason:blog
      title: 博客
      url: /
      theme: '#1BCDFC'
    - id: projects
      icon: jason:projects
      title: 项目
      url: /categories/项目实践/
      theme: '#3DC550'
    - id: explore
      icon: jason:explore
      title: 探索
      url: /archives/
      theme: '#FA6400'
    - id: social
      icon: jason:social
      title: 社交
      url: https://github.com/jyxu0621
      theme: '#F44336'

site_tree:
  home:
    leftbar: recent
    rightbar:
      - layout: markdown
        title: 欢迎来到这里
        content: |
          这里是 Jason Xu 的技术学习博客，主要记录数字与混合信号集成电路、课程笔记和项目实践。

          [GitHub](https://github.com/jyxu0621) · [分类](/blog/categories/) · [标签](/blog/tags/)

footer:
  content: |
    本站由 [Jason Xu](/blog/) 使用 [Stellar](https://github.com/xaoxuu/hexo-theme-stellar) 主题创建。

comments:
  service: giscus
  comment_title: 快来参与讨论吧~
  lazyload: true
  giscus:
    src: https://giscus.app/client.js
    data-repo: jyxu0621/blog
    data-repo-id: R_kgDOTWpQAA
    data-category: Announcements
    data-category-id: DIC_kwDOTWpQAM4DBPlT
    data-mapping: pathname
    data-strict: 1
    data-reactions-enabled: 1
    data-emit-metadata: 0
    data-input-position: top
    data-theme: preferred_color_scheme
    data-lang: zh-CN
    data-loading: lazy
    crossorigin: anonymous
